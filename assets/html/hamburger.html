<!-- Mobile Hamburger Menu -->
<div id="mobile-menu" class="mobile-menu" aria-hidden="true">
  <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>
  <div class="mobile-menu-content">
    <div class="mobile-menu-header">
      <h3>Menu</h3>
      <button class="mobile-menu-close" id="mobile-menu-close" aria-label="Close menu">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="mobile-menu-body">
      <!-- Links -->
      <div class="mobile-menu-links">
        <a href="http://web.homelab1367.internal/author" target="_blank" rel="noopener" class="mobile-menu-link nav-author-link">
          <i class="bi bi-person-badge-fill"></i>
          <span>Author Profile</span>
        </a>
        <a href="#" id="mobile-admin-btn" class="mobile-menu-link" aria-label="Open admin panel">
          <i class="bi bi-gear-fill"></i>
          <span>Admin Panel</span>
        </a>
        <a href="#" id="mobile-settings-btn" class="mobile-menu-link">
          <i class="bi bi-gear-fill"></i>
          <span>Settings</span>
          <i class="bi bi-chevron-down ms-auto mobile-settings-chevron" style="transition: transform 0.2s;"></i>
        </a>
        <div id="mobile-settings-container" class="mobile-settings-dropdown" style="display: none; width: 100%;"></div>
      </div>
    </div>

    <!-- Mobile Status and Weather Panel -->
    <div class="mobile-menu-status-panel" id="mobile-menu-status-panel">
      <div class="m-status-row" id="m-status-row">
        <span class="m-label"><i class="bi bi-cpu-fill"></i> CPU Load:</span>
        <span class="m-val" id="m-status-cpu">--%</span>
      </div>
      <div class="m-status-row" id="m-status-row-ram">
        <span class="m-label"><i class="bi bi-memory"></i> RAM Usage:</span>
        <span class="m-val" id="m-status-ram">--%</span>
      </div>
      <div class="m-status-row" id="m-status-row-temp">
        <span class="m-label"><i class="bi bi-thermometer-high"></i> CPU Temp:</span>
        <span class="m-val" id="m-status-temp">--°C</span>
      </div>
      <div class="m-status-row" id="m-status-row-weather">
        <span class="m-label"><i class="bi bi-cloud-sun-fill" id="m-weather-icon"></i> Weather:</span>
        <span class="m-val" id="m-weather-temp">--°C</span>
      </div>
    </div>
  </div>
</div>
