<!-- ===== Splash Screen ===== -->
<div id="splash-screen" class="splash-screen" aria-hidden="true">
  <!-- Animated dot-grid background -->
  <div class="splash-grid"></div>
  <!-- Horizontal scan line sweep -->
  <div class="splash-scanline"></div>
  <!-- HUD corner brackets -->
  <div class="splash-corner splash-corner--tl"></div>
  <div class="splash-corner splash-corner--tr"></div>
  <div class="splash-corner splash-corner--bl"></div>
  <div class="splash-corner splash-corner--br"></div>
  <!-- Decorative data-stream lines -->
  <div class="splash-hline splash-hline--top"></div>
  <div class="splash-hline splash-hline--bot"></div>
  <!-- Main content -->
  <div class="splash-content">
    <div class="splash-logo-wrap">
      <img src="assets/img/brand.png" alt="IdealHub Logo" class="splash-logo" id="splash-logo" />
      <div class="splash-logo-glow"></div>
      <div class="splash-orbit-ring"></div>
      <div class="splash-orbit-ring splash-orbit-ring--2"></div>
    </div>
    <div class="splash-brand" id="splash-brand">
      <span class="splash-brand-text" id="splash-brand-text"></span><span class="splash-cursor">_</span>
    </div>
    <p class="splash-subtitle" id="splash-subtitle"></p>
    <div class="splash-status" id="splash-status">INITIALIZING SYSTEMS</div>
    <div class="splash-loader" id="splash-loader">
      <div class="splash-loader-track">
        <div class="splash-loader-bar" id="splash-bar"></div>
        <div class="splash-loader-sweep"></div>
      </div>
      <div class="splash-loader-pct" id="splash-pct">0%</div>
    </div>
  </div>
</div>
