<!-- Mobile Search Popup -->
<div id="mobile-search-popup" class="mobile-search-popup" aria-hidden="true">
  <div class="mobile-search-popup-overlay" id="mobile-search-popup-overlay"></div>
  <div class="mobile-search-popup-content">
    <div class="mobile-search-popup-header">
      <div class="mobile-search-popup-input">
        <i class="bi bi-search"></i>
        <input type="text" id="mobile-popup-search-input" placeholder="Search apps" aria-label="Search content" />
      </div>
      <button class="mobile-search-popup-close" id="mobile-search-popup-close" aria-label="Close search">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </div>
</div>
