<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IdealHub@HomeLab1367</title>
  <link rel="icon" type="image/png" href="assets/img/brand.png" />

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="assets/css/styles.css" rel="stylesheet" />
  <link href="assets/css/admin.css" rel="stylesheet" />
</head>

<body>
  <!-- Hidden SVG Color Filters (referenced by CSS for color-vision accessibility) -->
  <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="filter-deuteranopia" x="0" y="0" width="100%" height="100%" color-interpolation-filters="linearRGB">
        <feColorMatrix type="matrix"
          values="0.367 0.861 -0.228 0 0  0.280 0.673  0.047 0 0  -0.012 0.043  0.969 0 0  0 0 0 1 0" />
      </filter>
      <filter id="filter-protanopia" x="0" y="0" width="100%" height="100%" color-interpolation-filters="linearRGB">
        <feColorMatrix type="matrix"
          values="0.152 1.053 -0.205 0 0  0.115 0.786  0.099 0 0  -0.004 -0.048  1.052 0 0  0 0 0 1 0" />
      </filter>
      <filter id="filter-tritanopia" x="0" y="0" width="100%" height="100%" color-interpolation-filters="linearRGB">
        <feColorMatrix type="matrix"
          values="1.256 -0.077 -0.180 0 0  -0.078  0.931  0.148 0 0   0.005  0.691  0.304 0 0  0 0 0 1 0" />
      </filter>
    </defs>
  </svg>

  <!-- Splash screen container (dynamically injected) -->


  <div id="particles-js"></div>

  <!-- Navigation Bar (Desktop & Mobile) -->
  <nav class="navbar-tv fixed-top">
    <!-- Hamburger Menu Button (Mobile Only) -->
    <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle menu">
      <i class="bi bi-list"></i>
    </button>

    <a href="#" class="nav-brand" aria-label="Scroll to top - IdealHub"
      onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;">
      <img src="assets/img/brand.png" alt="IdealHub Logo" class="brand-logo" />
      <span class="brand-text">IdealHub</span>
    </a>

    <div class="nav-search center-search">
      <div class="search-input-wrapper">
        <i class="bi bi-search"></i>
        <input type="text" id="global-search-input" placeholder="Search apps" aria-label="Search content" />
      </div>
    </div>

    <div class="nav-profile">
      <!-- Mobile Search Button (icon only, mobile only) -->
      <button class="mobile-search-btn" id="mobile-search-toggle" aria-label="Toggle search">
        <i class="bi bi-search"></i>
      </button>

      <a href="http://web.homelab1367.internal/author" target="_blank" rel="noopener" aria-label="Open Author Profile" class="nav-author-link">
        <i id="author-icon" class="bi bi-person-badge-fill"></i>
      </a>
      <a href="#" id="settings-btn" aria-label="Open accessibility settings">
        <i id="settings-icon" class="bi bi-gear-fill"></i>
      </a>
      <a href="#" id="theme-toggle-btn" aria-label="Toggle Dark/Light Theme">
        <i id="theme-toggle-icon" class="bi bi-moon-fill"></i>
      </a>
      <!-- Server Status + Weather + Clock wrapper -->
      <div class="nav-clock-weather" id="nav-clock-weather">
        <div class="nav-status" id="nav-status" title="Server Status">
          <i class="bi bi-cpu-fill" id="status-icon"></i>
          <span id="status-text">--%</span>
        </div>
        <div class="nav-weather" id="nav-weather" title="Current weather">
          <i class="bi bi-cloud-sun-fill" id="weather-icon"></i>
          <span id="weather-temp">--°</span>
        </div>
        <div id="real-time-clock" class="time"></div>
      </div>
    </div>
  </nav>

  <!-- Main Interface -->
  <main class="main-container-tv">
    <div class="feature-banner">
      <div class="feature-content">
        <h1 class="feature-title" id="greeting-text">Welcome</h1>
        <p class="feature-meta">HomeLab1367 Web Portal @ 2026</p>
        <p class="feature-description">
          Quick access to all self-hosted applications, media servers, and
          university projects on the local network.
        </p>
      </div>
      <div class="feature-image-overlay"></div>
    </div>

    <div id="sections-container">
      <!-- Content loaded from services.json -->
    </div>

    <hr class="tv-divider" />

    <footer>
      <div class="footer-content">
        <div class="footer-copyright">
          <small>&copy; HomeLab1367 Portal @ 2026</small>
        </div>
        <div class="footer-divider">•</div>
        <div class="footer-author">
          <small>Web Master: <span class="footer-name">Tan Jun Lin</span></small>
        </div>
        <div class="footer-divider">•</div>
        <div class="footer-version">
          <small>Version 2.3.7</small>
        </div>
      </div>
    </footer>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script>
    (async function() {
        const components = [
            'assets/html/splash.html',
            'assets/html/hamburger.html',
            'assets/html/search-popup.html',
            'assets/html/settings.html',
            'assets/html/admin-login.html',
            'assets/html/admin-drawer.html'
        ];

        // Fetch and append components in parallel
        await Promise.all(components.map(async (path) => {
            try {
                const res = await fetch(path);
                if (res.ok) {
                    const html = await res.text();
                    const temp = document.createElement('div');
                    temp.innerHTML = html;
                    while (temp.firstChild) {
                        document.body.appendChild(temp.firstChild);
                    }
                }
            } catch (e) {
                console.error('Failed to load component:', path, e);
            }
        }));

        // Load the scripts sequentially so they execute in the correct order
        const scripts = [
            'assets/js/script.js',
            'assets/js/settings.js',
            'assets/js/hamburger.js',
            'assets/js/splash.js',
            'assets/js/admin.js'
        ];

        for (const src of scripts) {
            await new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                document.body.appendChild(script);
            });
        }
    })();
  </script>
</body>

</html>
